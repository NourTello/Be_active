kind = "web"
previewPath = "/"
title = "Health & Wellness"
version = "1.0.0"
id = "artifacts/health-wellness"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19327

[services.development]
run = "pnpm --filter @workspace/health-wellness run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/health-wellness", "run", "build" ]
publicDir = "artifacts/health-wellness/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19327"
BASE_PATH = "/"
